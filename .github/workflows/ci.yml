name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install documentation tools
        run: npm install -g markdownlint-cli2 cspell
      - name: Verify
        run: make verify
